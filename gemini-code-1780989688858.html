<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft HTML5 - النسخة البرمجية الاحترافية</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #7299ef; font-family: sans-serif; }
        canvas { display: block; }
        
        /* شاشة البدء وقفل الماوس */
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; background-color: rgba(0, 0, 0, 0.85);
            padding: 40px; border-radius: 10px; cursor: pointer; user-select: none;
            z-index: 10; border: 2px solid #555; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        /* مؤشر التصويب في المنتصف */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 28px; font-weight: light;
            user-select: none; pointer-events: none; z-index: 5; opacity: 0.8;
        }
        
        /* شريط القلوب */
        #health-bar {
            position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4px; z-index: 5; font-size: 24px; pointer-events: none;
        }
        
        /* شريط الأدوات السفلي (Hotbar) */
        #hotbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; background-color: rgba(30, 30, 30, 0.85);
            padding: 6px; border-radius: 4px; border: 2px solid #555; z-index: 5;
        }
        .slot {
            width: 50px; height: 50px; margin: 0 4px; border: 2px solid #333;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 12px; border-radius: 4px;
            transition: all 0.1s ease;
        }
        .slot.active { border-color: #ffffff; box-shadow: 0 0 15px #ffffff; background-color: rgba(255, 255, 255, 0.2); }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="health-bar">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>

    <div id="instructions">
        <h1 style="margin-top: 0; color: #5cb85c;">MINECRAFT JS ENGINE</h1>
        <p style="font-size: 18px; color: #ffeb3b;">اضغط هنا للبدء والدخول إلى العالم 🌍</p>
        <p style="color: #ccc; line-height: 1.6; font-size: 14px; text-align: right; direction: rtl;">
            • الحركة: <span style="color:#fff">W, A, S, D</span><br>
            • الطيران/التحليق: <span style="color:#fff">Spacebar</span> للأعلى | <span style="color:#fff">Left-Shift</span> للأسفل<br>
            • التفاعل مع البيئة: <span style="color:#ff4444">كليك يسار</span> للهدم | <span style="color:#5cb85c">كليك يمين</span> للبناء<br>
            • تغيير نوع المكعب: الأرقام <span style="color:#fff">1, 2, 3, 4</span> في لوحة المفاتيح
        </p>
    </div>

    <div id="hotbar">
        <div class="slot active" id="slot-1" style="background-color: #55aaff;">عشب</div>
        <div class="slot" id="slot-2" style="background-color: #8b5a2b;">تراب</div>
        <div class="slot" id="slot-3" style="background-color: #777777;">حجر</div>
        <div class="slot" id="slot-4" style="background-color: #a0522d;">خشب</div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const clock = new THREE.Clock();

        let blocksWorld = []; // مصفوفة لتخزين مكعبات العالم المتاحة للتفاعل
        let currentBlockType = 1; // النوع الافتراضي: عشب
        let blockTargetOutline; // الإطار الأحمر الذي يحدد البلوك المستهدف

        // إعداد خامات وألوان المكعبات الافتراضية للعبة
        const blockMaterials = {
            1: new THREE.MeshStandardMaterial({ color: 0x55aa44, roughness: 0.6 }), // عشب
            2: new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.8 }), // تراب
            3: new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.4 }), // حجر
            4: new THREE.MeshStandardMaterial({ color: 0xa0522d, roughness: 0.5 })  // خشب
        };
        const blockGeometry = new THREE.BoxGeometry(1, 1, 1);
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // الماوس دائماً في المنتصف بنظام الـ PointerLock

        init();
        animate();

        function init() {
            // 1. إنشاء المشهد والإضاءة والضباب المحاكي لماين كرافت
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7299ef); // لون السماء الأزرق
            scene.fog = new THREE.FogExp2(0x7299ef, 0.025);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // 2. إعداد الكاميرا ومحرك العرض الرسومي Renderer
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 3. نظام متحكمات الشخص الأول وقفل حركة الماوس داخل المتصفح
            controls = new THREE.PointerLockControls(camera, document.body);

            const instructions = document.getElementById('instructions');
            instructions.addEventListener('click', function() { controls.lock(); });
            controls.addEventListener('lock', function() { instructions.style.display = 'none'; });
            controls.addEventListener('unlock', function() { instructions.style.display = 'block'; });
            scene.add(controls.getObject());

            // موقع بداية اللاعب في الهواء فوق التضاريس لقدرة المراقبة والطيران
            controls.getObject().position.set(10, 14, 10);

            // إعداد الإطار السلكي الأحمر لتحديد المكعب الذي ينظر إليه اللاعب
            blockTargetOutline = new THREE.Mesh(
                new THREE.BoxGeometry(1.01, 1.01, 1.01), 
                new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true })
            );
            blockTargetOutline.visible = false;
            scene.add(blockTargetOutline);

            // 4. خوارزمية بناء العالم التلقائي (Procedural Generation Engine)
            const worldSize = 24; // مساحة الخريطة المبدئية 24x24
            for (let x = 0; x < worldSize; x++) {
                for (let z = 0; z < worldSize; z++) {
                    // معادلة جيبية رياضية لتوليد تلال وهضاب سلسة في اللعبة
                    let height = Math.round((Math.sin(x * 0.2) * Math.cos(z * 0.2) * 3) + 5);
                    for (let y = 0; y <= height; y++) {
                        let currentMat = blockMaterials[3]; // حجر في الأعماق
                        if (y === height) currentMat = blockMaterials[1]; // عشب في الأعلى
                        else if (y > height - 3) currentMat = blockMaterials[2]; // تراب تحت العشب

                        const block = new THREE.Mesh(blockGeometry, currentMat);
                        block.position.set(x, y, z);
                        scene.add(block);
                        blocksWorld.push(block); // إضافة المكعب للمصفوفة التفاعلية
                    }
                }
            }

            // 5. إدارة لوحة المفاتيح للحركة وتغيير المكعبات والـ Hotbar
            const onKeyDown = function(event) {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': controls.getObject().position.y += 0.8; break; // طيران للأعلى
                    case 'ShiftLeft': controls.getObject().position.y -= 0.8; break; // طيران للأسفل
                    
                    // تغيير السلوتات النشطة
                    case 'Digit1': updateActiveSlot(1); break;
                    case 'Digit2': updateActiveSlot(2); break;
                    case 'Digit3': updateActiveSlot(3); break;
                    case 'Digit4': updateActiveSlot(4); break;
                }
            };
            
            const onKeyUp = function(event) {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('contextmenu', e => e.preventDefault()); // منع القائمة المنبثقة عند كليك يمين
            
            // 6. أحداث الماوس للهدم (كليك يسار) والبناء (كليك يمين)
            document.addEventListener('mousedown', function(e) {
                if (!controls.isLocked) return;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(blocksWorld);
                
                if (intersects.length > 0 && intersects[0].distance < 8) {
                    const hitBlock = intersects[0].object;
                    
                    if (e.button === 0) { // كليك يسار -> هدم المكعب المستهدف فورا
                        scene.remove(hitBlock);
                        blocksWorld = blocksWorld.filter(obj => obj !== hitBlock);
                    } 
                    else if (e.button === 2) { // كليك يمين -> حساب الاتجاه لبناء مكعب جديد مجاور
                        const normal = intersects[0].face.normal; // الحصول على اتجاه الوجه المضغوط
                        const newPosition = hitBlock.position.clone().add(normal);
                        
                        const newBlock = new THREE.Mesh(blockGeometry, blockMaterials[currentBlockType]);
                        newBlock.position.copy(newPosition);
                        scene.add(newBlock);
                        blocksWorld.push(newBlock);
                    }
                }
            });

            window.addEventListener('resize', onWindowResize);
        }

        // دالة تحديث السلوت النشط سفلياً بناءً على اختيار اللاعب
        function updateActiveSlot(slotIndex) {
            currentBlockType = slotIndex;
            document.querySelectorAll('.slot').forEach(slot => slot.classList.remove('active'));
            document.getElementById(`slot-${slotIndex}`).classList.add('active');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked === true) {
                // تتبع وتحديد المكعب الذي ينظر إليه مؤشر التصويب في المنتصف
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(blocksWorld);
                
                if (intersects.length > 0 && intersects[0].distance < 8) {
                    blockTargetOutline.position.copy(intersects[0].object.position);
                    blockTargetOutline.visible = true;
                } else {
                    blockTargetOutline.visible = false;
                }

                // حسابات سرعات وفيزياء حركة الطيران السلس للاعب في الأبعاد الثلاثية
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
